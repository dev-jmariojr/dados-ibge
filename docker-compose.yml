version: "3.8"

services:

  mongo:
    image: mongo:6
    container_name: ibge_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: user_mongo
      MONGO_INITDB_ROOT_PASSWORD: pass_mongo
    volumes:
      - mongo_data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ibge_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: user_rabbit
      RABBITMQ_DEFAULT_PASS: pass_rabbit

  app:
    container_name: ibge_app
    build: .
    ports:
      - "8090:8090"
    depends_on:
      - mongo
      - rabbitmq
    environment:
      SPRING_DATA_MONGODB_HOST: mongo
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_USERNAME: user_mongo
      SPRING_DATA_MONGODB_PASSWORD: pass_mongo
      SPRING_DATA_MONGODB_DATABASE: dadosibgeDB

      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: user_rabbit
      SPRING_RABBITMQ_PASSWORD: pass_rabbit

volumes:
  mongo_data: