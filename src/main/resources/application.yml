server:
  port: 8090
spring:
  data:
    mongodb:
      host: ${SPRING_DATA_MONGODB_HOST:localhost}
      port: ${SPRING_DATA_MONGODB_PORT:27017}
      username: ${SPRING_DATA_MONGODB_USERNAME:user_mongo}
      password: ${SPRING_DATA_MONGODB_PASSWORD:pass_mongo}
      database: ${SPRING_DATA_MONGODB_DATABASE:dadosibgeDB}
      authentication-database: admin
  api:
    ibge:
      urlbase: https://servicodados.ibge.gov.br/api/v1/localidades/
      path:
        regions: regioes
        states: regioes/{macrorregiao}/estados
        cities: estados/{uf}/municipios
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:127.0.0.1}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:user_rabbit}
    password: ${SPRING_RABBITMQ_PASSWORD:pass_rabbit}
    listener:
      simple:
        prefetch: 1
        concurrency: 1
        max-concurrency: 3
exchange:
  name: exchange.ibge
routingkey:
  regions: import.regions
  states: import.states
  cities: import.cities